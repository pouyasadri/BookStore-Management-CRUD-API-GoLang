name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DB_HOST: localhost
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: bookstore
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: bookstore
          MYSQL_ROOT_HOST: '%'
        # rely on our explicit readiness loop below instead of service-level health checks
        ports:
          - 3306:3306

    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Install MySQL client
      run: sudo apt-get update && sudo apt-get install -y default-mysql-client

    - name: Wait for MySQL to be ready
      run: |
        set -euo pipefail
        # Prefer checking readiness by exec'ing into the service container itself.
        for i in $(seq 1 60); do
          mysql_cid=$(docker ps --filter ancestor=mysql:8.0 --format '{{.ID}}' | head -n1 || true)
          if [ -n "$mysql_cid" ]; then
            # Try ping with the configured password
            if docker exec "$mysql_cid" mysqladmin ping -u"$DB_USER" -p"$DB_PASSWORD" --silent >/dev/null 2>&1; then
              echo "MySQL (container $mysql_cid) is up (auth with password)"
              docker exec "$mysql_cid" mysql --version || true
              docker exec "$mysql_cid" mysqladmin version || true
              exit 0
            fi
            # Try ping without password (some images initialize root with empty password)
            if docker exec "$mysql_cid" mysqladmin ping -u"$DB_USER" --silent >/dev/null 2>&1; then
              echo "MySQL (container $mysql_cid) is up (no-password root)"
              docker exec "$mysql_cid" mysql --version || true
              exit 0
            fi
            # Try performing a simple SELECT 1 with and without password
            if docker exec "$mysql_cid" sh -c "mysql -u\"$DB_USER\" -p\"$DB_PASSWORD\" -e 'SELECT 1;'" >/dev/null 2>&1; then
              echo "MySQL (container $mysql_cid) accepted SQL (auth with password)"
              exit 0
            fi
            if docker exec "$mysql_cid" sh -c "mysql -u\"$DB_USER\" -e 'SELECT 1;'" >/dev/null 2>&1; then
              echo "MySQL (container $mysql_cid) accepted SQL (no-password root)"
              exit 0
            fi
          fi
          echo "Waiting for MySQL container... ($i)"
          sleep 2
        done
        echo "MySQL did not become ready in time"
        echo "=== Docker ps ==="
        docker ps --format 'table {{.ID}}\t{{.Image}}\t{{.Status}}\t{{.Names}}'
        echo "=== MySQL logs ==="
        docker logs $(docker ps --filter ancestor=mysql:8.0 --format '{{.ID}}') || true
        exit 1

    - name: Run linter
      run: go vet ./...

    - name: Build
      run: go build -v ./cmd/main

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t bookstore-api:latest .

    - name: Run Docker image
      run: |
        docker run -d --name test-container bookstore-api:latest sleep 30
        sleep 5
        docker logs test-container
        docker stop test-container
